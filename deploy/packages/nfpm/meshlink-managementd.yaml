name: meshlink-managementd
arch: amd64
platform: linux
version: ${MESHLINK_PACKAGE_VERSION}
release: ${MESHLINK_PACKAGE_RELEASE}
section: net
priority: optional
maintainer: MeshLink Maintainers
vendor: MeshLink
license: MIT
description: |
  MeshLink management service with systemd unit and packaged defaults.
contents:
  - src: ./dist/bin/linux-amd64/server/managementd
    dst: /usr/bin/managementd
    file_info:
      mode: 0755
  - src: ./deploy/systemd/meshlink-managementd.service
    dst: /lib/systemd/system/meshlink-managementd.service
    file_info:
      mode: 0644
  - src: ./deploy/packages/env/meshlink-managementd.env
    dst: /etc/default/meshlink-managementd.env
    type: config|noreplace
    file_info:
      mode: 0644
  - src: ./deploy/examples/bootstrap.env.example
    dst: /usr/share/doc/meshlink-managementd/examples/bootstrap.env.example
    file_info:
      mode: 0644
  - src: ./deploy/packages/examples/managementd.env.example
    dst: /usr/share/doc/meshlink-managementd/examples/managementd.env.example
    file_info:
      mode: 0644
